function reduceNumber(n) {
    if (n === 11 || n === 22) return n;
    while (n > 9) {
        n = String(n).split("").reduce((sum, digit) => sum + Number(digit), 0);
        if (n === 11 || n === 22) return n;
    }
    return n;
}

function updateLanguage() {
    const l = I18N[document.getElementById('langSelect').value];
    document.getElementById('mainTitle').innerText = l.main;
    document.getElementById('eduTitle').innerText = l.eduT;
    document.getElementById('eduText').innerText = l.eduD;
    document.getElementById('glossaryTitle').innerText = l.gloT;
    document.getElementById('dateLabel').innerText = l.date;
    document.getElementById('genBtn').innerText = l.btn;
    document.getElementById('pdfBtn').innerText = l.pdf;

    document.getElementById('glossaryGrid').innerHTML = l.pils
        .map(item => `<div><b>${item.k}:</b> ${item.v}</div>`)
        .join("");

    l.labs.forEach((txt, i) => {
        document.getElementById('lb' + (i + 1)).innerText = txt;
    });
}

function generate() {
    const val = document.getElementById('birthDate').value;
    if (!val) {
        alert('Selecciona una fecha de nacimiento.');
        return;
    }

    const l = I18N[document.getElementById('langSelect').value];
    const [y, m, d] = val.split('-').map(Number);

    const day = reduceNumber(d);
    const month = reduceNumber(m);
    const yearFull = reduceNumber(y);
    const yearShort = reduceNumber(Number(String(y).slice(-2)));
    const mission = reduceNumber(day + month + yearFull);

    const res = [day, month, yearShort, yearFull, mission];

    res.forEach((v, i) => {
        const node = document.getElementById('n' + (i + 1));
        node.innerText = v;
        node.setAttribute('aria-label', `${l.labs[i]}: ${v}`);
    });

    let html = "";
    res.forEach((num, i) => {
        const a = l.archs[num] || ["Explorer", "Energy.", "Doubt.", "Follow.", "Move."];
        html += `<div class="result-card">
            <h3 style="margin:0 0 10px 0; color:var(--primary);">${l.labs[i]}: ${a[0]} (${num})</h3>
            <div class="detail-row">✨ <b>${l.tags[0]}:</b> ${a[1]}</div>
            <div class="detail-row">🌑 <b>${l.tags[1]}:</b> ${a[2]}</div>
            <div class="detail-row">🎯 <b>${l.tags[2]}:</b> ${a[3]}</div>
            <div class="detail-row">⚡ <b>${l.tags[3]}:</b> ${a[4]}</div>
        </div>`;
    });

    document.getElementById('details').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}

function download() {
    html2pdf()
        .from(document.getElementById('capture'))
        .set({
            margin: 10,
            filename: 'Mapa_Vida_Tantrico.pdf',
            html2canvas: { scale: 2 }
        })
        .save();
}
