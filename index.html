<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Vida Tántrico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #6200ee; }
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .result-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; background: #f9f9f9; }
        .detail-row { margin: 5px 0; }
        #results { display: none; }
    </style>
</head>
<body>

    <select id="langSelect" onchange="updateLanguage()">
        <option value="es">Español</option>
        <option value="en">English</option>
    </select>

    <h1 id="mainTitle"></h1>
    
    <div id="education">
        <h2 id="eduTitle"></h2>
        <p id="eduText"></p>
    </div>

    <div id="glossary">
        <h2 id="glossaryTitle"></h2>
        <div id="glossaryGrid"></div>
    </div>

    <hr>

    <label id="dateLabel" for="birthDate"></label>
    <input type="date" id="birthDate">
    <button id="genBtn" onclick="generate()"></button>

    <div id="results">
        <div id="capture">
            <div id="pilarLabels">
                <span id="lb1"></span> <span id="n1"></span> |
                <span id="lb2"></span> <span id="n2"></span> |
                <span id="lb3"></span> <span id="n3"></span> |
                <span id="lb4"></span> <span id="n4"></span> |
                <span id="lb5"></span> <span id="n5"></span>
            </div>
            <div id="details"></div>
        </div>
        <button id="pdfBtn" onclick="download()"></button>
    </div>

    <script>
        // Pega aquí todo el código <script> que me enviaste arriba
        const I18N = { ... }; // (Tu código completo)
        
        // Al final, asegúrate de que llame a updateLanguage()
        updateLanguage();
    </script>
</body>
</html>
