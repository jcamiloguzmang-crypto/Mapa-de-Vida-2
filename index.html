<script>
function reduceNumber(n) {
    if (n === 11 || n === 22) return n;
    while (n > 9) {
        n = String(n).split("").reduce((sum, d) => sum + Number(d), 0);
        if (n === 11 || n === 22) return n;
    }
    return n;
}

function generate() {
    const val = document.getElementById('birthDate').value;
    if (!val) return;

    const l = I18N[document.getElementById('langSelect').value];
    const [y, m, d] = val.split('-').map(Number);

    const soul = reduceNumber(d);
    const karma = reduceNumber(m);
    const gift = reduceNumber(Number(String(y).slice(-2)));
    const destiny = reduceNumber(String(y).split('').reduce((a, b) => a + Number(b), 0));
    const path = reduceNumber(soul + karma + destiny);

    const res = [soul, karma, gift, destiny, path];

    res.forEach((v, i) => {
        document.getElementById('n' + (i + 1)).innerText = v;
    });

    let html = "";
    res.forEach((num, i) => {
        const a = l.archs[num] || ["Explorer", "Energy.", "Doubt.", "Follow.", "Move."];
        html += `<div class="result-card">
            <h3 style="margin:0 0 10px 0; color:var(--primary);">${l.labs[i]}: ${a[0]} (${num})</h3>
            <div class="detail-row">✨ <b>${l.tags[0]}:</b> ${a[1]}</div>
            <div class="detail-row">🌑 <b>${l.tags[1]}:</b> ${a[2]}</div>
            <div class="detail-row">🎯 <b>${l.tags[2]}:</b> ${a[3]}</div>
            <div class="detail-row">⚡ <b>${l.tags[3]}:</b> ${a[4]}</div>
        </div>`;
    });

    document.getElementById('details').innerHTML = html;
    document.getElementById('results').style.display = 'block';
}
</script>
